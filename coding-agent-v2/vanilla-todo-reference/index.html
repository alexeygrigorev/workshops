<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vanilla Todo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --panel: #fffdf8;
      --text: #1e1e1e;
      --muted: #6a675f;
      --accent: #1f7a5c;
      --accent-dark: #175944;
      --danger: #b4432f;
      --line: #e3dac8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: linear-gradient(180deg, #efe7d6 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 50px rgba(71, 57, 31, 0.08);
      overflow: hidden;
    }

    .hero {
      padding: 32px 32px 20px;
      border-bottom: 1px solid var(--line);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 2.4rem;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .content {
      padding: 24px 32px 32px;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      font: inherit;
      background: #fff;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font: inherit;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      color: var(--muted);
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
    }

    ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .todo-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
    }

    .todo-item.done .todo-text {
      color: var(--muted);
      text-decoration: line-through;
    }

    .delete-btn {
      background: transparent;
      color: var(--danger);
      padding: 8px 10px;
    }

    .empty-state {
      margin: 0;
      padding: 24px 0 8px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .hero,
      .content {
        padding-left: 20px;
        padding-right: 20px;
      }

      form {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <header class="hero">
        <h1>Desk Todo</h1>
        <p>A small browser todo app built with plain HTML, vanilla JavaScript, and local storage.</p>
      </header>

      <div class="content">
        <form id="todo-form">
          <input id="todo-input" type="text" placeholder="Add a task you do not want to forget" required>
          <button class="primary" type="submit">Add task</button>
        </form>

        <div class="stats">
          <span class="pill">Total: <strong id="total-count">0</strong></span>
          <span class="pill">Open: <strong id="open-count">0</strong></span>
          <span class="pill">Done: <strong id="done-count">0</strong></span>
        </div>

        <ul id="todo-list"></ul>
        <p id="empty-state" class="empty-state">No tasks yet. Add one to get started.</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
