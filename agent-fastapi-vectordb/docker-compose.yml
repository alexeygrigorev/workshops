services:
  app:
    build: .
    ports:
      - "9696:9696"
    environment:
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SEARCH_BACKEND: "${SEARCH_BACKEND:-minsearch}"
      QDRANT_URL: "${QDRANT_URL:-http://qdrant:6333}"
      QDRANT_API_KEY: "${QDRANT_API_KEY:-}"

  qdrant:
    image: qdrant/qdrant:latest
    profiles: ["qdrant"]
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

volumes:
  qdrant_storage:
