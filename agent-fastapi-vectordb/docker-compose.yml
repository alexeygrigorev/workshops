services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  app:
    build: .
    ports:
      - "9696:9696"
    environment:
      QDRANT_URL: "http://qdrant:6333"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
    depends_on:
      - qdrant

volumes:
  qdrant_storage:
